meta:
  version: 1
  description: OS Image Catalog
  reference_sites:
  - name: endoflife.date
    url: https://endoflife.date/
  - name: DistroWatch
    url: https://distrowatch.com/
  - name: massgrave.dev
    url: https://massgrave.dev/genuine-installation-media
tracking:
  ubuntu:
    product: ubuntu
    match_depth: 2
    lts_only: true
    update_templates:
      type: static
      category: linux
      homepage: https://ubuntu.com/
      checksum_algorithm: sha256
      variants:
      - id_template: ubuntu-{cycle}-desktop
        name_template: "Ubuntu {latest} LTS"
        arch: amd64
        edition: Desktop
        url_template: 
          https://releases.ubuntu.com/{cycle}/ubuntu-{latest}-desktop-amd64.iso
        checksums_url: https://releases.ubuntu.com/{cycle}/SHA256SUMS
        filename_pattern: ubuntu-{latest}-desktop-amd64.iso
      - id_template: ubuntu-{cycle}-server
        name_template: "Ubuntu {latest} LTS"
        arch: amd64
        edition: Server
        url_template: 
          https://releases.ubuntu.com/{cycle}/ubuntu-{latest}-live-server-amd64.iso
        checksums_url: https://releases.ubuntu.com/{cycle}/SHA256SUMS
        filename_pattern: ubuntu-{latest}-live-server-amd64.iso
      - id_template: ubuntu-{cycle}-desktop-arm64
        name_template: "Ubuntu {latest} LTS"
        arch: arm64
        edition: Desktop
        url_template: 
          https://cdimage.ubuntu.com/ubuntu/releases/{cycle}/release/ubuntu-{latest}-desktop-arm64.iso
        checksums_url: 
          https://cdimage.ubuntu.com/ubuntu/releases/{cycle}/release/SHA256SUMS
        filename_pattern: ubuntu-{latest}-desktop-arm64.iso
      - id_template: ubuntu-{cycle}-server-arm64
        name_template: "Ubuntu {latest} LTS"
        arch: arm64
        edition: Server
        url_template: 
          https://cdimage.ubuntu.com/releases/{cycle}/release/ubuntu-{latest}-live-server-arm64.iso
        checksums_url: 
          https://cdimage.ubuntu.com/releases/{cycle}/release/SHA256SUMS
        filename_pattern: ubuntu-{latest}-live-server-arm64.iso
      - id_template: ubuntu-{cycle}-cloud-amd64
        name_template: "Ubuntu {cycle} LTS"
        version_template: "{cycle}"
        arch: amd64
        edition: Cloud image
        image_type: cloud-image
        format: qcow2
        url_template: 
          https://cloud-images.ubuntu.com/{codename_slug}/current/{codename_slug}-server-cloudimg-amd64.img
        checksums_url: 
          https://cloud-images.ubuntu.com/{codename_slug}/current/SHA256SUMS
        filename_pattern: "{codename_slug}-server-cloudimg-amd64.img"
      - id_template: ubuntu-{cycle}-cloud-arm64
        name_template: "Ubuntu {cycle} LTS"
        version_template: "{cycle}"
        arch: arm64
        edition: Cloud image
        image_type: cloud-image
        format: qcow2
        url_template: 
          https://cloud-images.ubuntu.com/{codename_slug}/current/{codename_slug}-server-cloudimg-arm64.img
        checksums_url: 
          https://cloud-images.ubuntu.com/{codename_slug}/current/SHA256SUMS
        filename_pattern: "{codename_slug}-server-cloudimg-arm64.img"
  debian:
    product: debian
    match_depth: 1
    update_templates:
      type: static
      category: linux
      homepage: https://www.debian.org/
      checksum_algorithm: sha256
      variants:
      - id_template: debian-{cycle}-netinst
        name_template: "Debian {latest}"
        arch: amd64
        edition: netinst
        url_template: 
          https://cdimage.debian.org/cdimage/archive/{latest}.0/amd64/iso-cd/debian-{latest}.0-amd64-netinst.iso
        checksums_url: 
          https://cdimage.debian.org/cdimage/archive/{latest}.0/amd64/iso-cd/SHA256SUMS
        filename_pattern: debian-{latest}.0-amd64-netinst.iso
      - id_template: debian-{cycle}-netinst-arm64
        name_template: "Debian {latest}"
        arch: arm64
        edition: netinst
        url_template: 
          https://cdimage.debian.org/cdimage/archive/{latest}.0/arm64/iso-cd/debian-{latest}.0-arm64-netinst.iso
        checksums_url: 
          https://cdimage.debian.org/cdimage/archive/{latest}.0/arm64/iso-cd/SHA256SUMS
        filename_pattern: debian-{latest}.0-arm64-netinst.iso
      - id_template: debian-{cycle}-cloud-amd64
        name_template: "Debian {cycle}"
        version_template: "{cycle}"
        arch: amd64
        edition: Cloud image
        image_type: cloud-image
        format: qcow2
        url_template: 
          https://cloud.debian.org/images/cloud/{codename_slug}/latest/debian-{major}-generic-amd64.qcow2
        checksums_url: 
          https://cloud.debian.org/images/cloud/{codename_slug}/latest/SHA512SUMS
        filename_pattern: debian-{major}-generic-amd64.qcow2
        checksum_algorithm: sha512
      - id_template: debian-{cycle}-cloud-arm64
        name_template: "Debian {cycle}"
        version_template: "{cycle}"
        arch: arm64
        edition: Cloud image
        image_type: cloud-image
        format: qcow2
        url_template: 
          https://cloud.debian.org/images/cloud/{codename_slug}/latest/debian-{major}-generic-arm64.qcow2
        checksums_url: 
          https://cloud.debian.org/images/cloud/{codename_slug}/latest/SHA512SUMS
        filename_pattern: debian-{major}-generic-arm64.qcow2
        checksum_algorithm: sha512
  fedora:
    product: fedora
    match_depth: 1
    update_templates:
      type: directory_parse
      category: linux
      homepage: https://fedoraproject.org/
      checksum_algorithm: sha256
      variants:
      - id_template: fedora-{cycle}-workstation
        name_template: "Fedora {cycle} Workstation"
        arch: x86_64
        edition: Workstation Live
        dir_url: 
          https://download.fedoraproject.org/pub/fedora/linux/releases/{cycle}/Workstation/x86_64/iso/
        filename_regex: Fedora-Workstation-Live-{cycle}-\d+\.\d+\.x86_64\.iso
        checksums_url: 
          https://download.fedoraproject.org/pub/fedora/linux/releases/{cycle}/Workstation/x86_64/iso/Fedora-Workstation-{cycle}-*-x86_64-CHECKSUM
      - id_template: fedora-{cycle}-server
        name_template: "Fedora {cycle} Server"
        arch: x86_64
        edition: Server netinst
        dir_url: 
          https://download.fedoraproject.org/pub/fedora/linux/releases/{cycle}/Server/x86_64/iso/
        filename_regex: Fedora-Server-netinst-x86_64-{cycle}-\d+\.\d+\.iso
        checksums_url: 
          https://download.fedoraproject.org/pub/fedora/linux/releases/{cycle}/Server/x86_64/iso/Fedora-Server-{cycle}-*-x86_64-CHECKSUM
      - id_template: fedora-{cycle}-workstation-arm64
        name_template: "Fedora {cycle} Workstation"
        arch: aarch64
        edition: Workstation Live
        dir_url: 
          https://download.fedoraproject.org/pub/fedora/linux/releases/{cycle}/Workstation/aarch64/iso/
        filename_regex: Fedora-Workstation-Live-{cycle}-\d+\.\d+\.aarch64\.iso
        checksums_url: 
          https://download.fedoraproject.org/pub/fedora/linux/releases/{cycle}/Workstation/aarch64/iso/Fedora-Workstation-{cycle}-*-aarch64-CHECKSUM
      - id_template: fedora-{cycle}-server-arm64
        name_template: "Fedora {cycle} Server"
        arch: aarch64
        edition: Server netinst
        dir_url: 
          https://download.fedoraproject.org/pub/fedora/linux/releases/{cycle}/Server/aarch64/iso/
        filename_regex: Fedora-Server-netinst-aarch64-{cycle}-\d+\.\d+\.iso
        checksums_url: 
          https://download.fedoraproject.org/pub/fedora/linux/releases/{cycle}/Server/aarch64/iso/Fedora-Server-{cycle}-*-aarch64-CHECKSUM
      - id_template: fedora-{cycle}-cloud-amd64
        name_template: "Fedora {cycle}"
        version_template: "{cycle}"
        arch: x86_64
        edition: Cloud image
        image_type: cloud-image
        format: qcow2
        dir_url: 
          https://download.fedoraproject.org/pub/fedora/linux/releases/{cycle}/Cloud/x86_64/images/
        filename_regex: 
          Fedora-Cloud-Base-Generic-{cycle}-\d+\.\d+\.x86_64\.qcow2
        checksums_url: 
          https://download.fedoraproject.org/pub/fedora/linux/releases/{cycle}/Cloud/x86_64/images/Fedora-Cloud-{cycle}-*-x86_64-CHECKSUM
      - id_template: fedora-{cycle}-cloud-arm64
        name_template: "Fedora {cycle}"
        version_template: "{cycle}"
        arch: aarch64
        edition: Cloud image
        image_type: cloud-image
        format: qcow2
        dir_url: 
          https://download.fedoraproject.org/pub/fedora/linux/releases/{cycle}/Cloud/aarch64/images/
        filename_regex: 
          Fedora-Cloud-Base-Generic-{cycle}-\d+\.\d+\.aarch64\.qcow2
        checksums_url: 
          https://download.fedoraproject.org/pub/fedora/linux/releases/{cycle}/Cloud/aarch64/images/Fedora-Cloud-{cycle}-*-aarch64-CHECKSUM
  rocky:
    product: rocky-linux
    match_depth: 1
    update_templates:
      type: directory_parse
      category: linux
      homepage: https://rockylinux.org/
      checksum_algorithm: sha256
      variants:
      - id_template: rocky-{latest}-dvd
        name_template: "Rocky Linux {latest}"
        arch: x86_64
        edition: DVD
        dir_url: https://download.rockylinux.org/pub/rocky/{major}/isos/x86_64/
        filename_regex: Rocky-{latest}-x86_64-dvd\d*\.iso
        checksums_url: 
          https://download.rockylinux.org/pub/rocky/{major}/isos/x86_64/CHECKSUM
      - id_template: rocky-{latest}-minimal
        name_template: "Rocky Linux {latest}"
        arch: x86_64
        edition: Minimal
        dir_url: https://download.rockylinux.org/pub/rocky/{major}/isos/x86_64/
        filename_regex: Rocky-{latest}-x86_64-minimal\.iso
        checksums_url: 
          https://download.rockylinux.org/pub/rocky/{major}/isos/x86_64/CHECKSUM
      - id_template: rocky-{latest}-dvd-arm64
        name_template: "Rocky Linux {latest}"
        arch: aarch64
        edition: DVD
        dir_url: https://download.rockylinux.org/pub/rocky/{major}/isos/aarch64/
        filename_regex: Rocky-{latest}-aarch64-dvd\d*\.iso
        checksums_url: 
          https://download.rockylinux.org/pub/rocky/{major}/isos/aarch64/CHECKSUM
      - id_template: rocky-{latest}-minimal-arm64
        name_template: "Rocky Linux {latest}"
        arch: aarch64
        edition: Minimal
        dir_url: https://download.rockylinux.org/pub/rocky/{major}/isos/aarch64/
        filename_regex: Rocky-{latest}-aarch64-minimal\.iso
        checksums_url: 
          https://download.rockylinux.org/pub/rocky/{major}/isos/aarch64/CHECKSUM
  almalinux:
    product: almalinux
    match_depth: 1
    update_templates:
      type: static
      category: linux
      homepage: https://almalinux.org/
      checksum_algorithm: sha256
      variants:
      - id_template: alma-{latest}-dvd
        name_template: "AlmaLinux {latest}"
        arch: x86_64
        edition: DVD
        url_template: 
          https://repo.almalinux.org/almalinux/{major}/isos/x86_64/AlmaLinux-{latest}-x86_64-dvd.iso
        checksums_url: 
          https://repo.almalinux.org/almalinux/{major}/isos/x86_64/CHECKSUM
        filename_pattern: AlmaLinux-{latest}-x86_64-dvd.iso
      - id_template: alma-{latest}-minimal
        name_template: "AlmaLinux {latest}"
        arch: x86_64
        edition: Minimal
        url_template: 
          https://repo.almalinux.org/almalinux/{major}/isos/x86_64/AlmaLinux-{latest}-x86_64-minimal.iso
        checksums_url: 
          https://repo.almalinux.org/almalinux/{major}/isos/x86_64/CHECKSUM
        filename_pattern: AlmaLinux-{latest}-x86_64-minimal.iso
      - id_template: alma-{latest}-dvd-arm64
        name_template: "AlmaLinux {latest}"
        arch: aarch64
        edition: DVD
        url_template: 
          https://repo.almalinux.org/almalinux/{major}/isos/aarch64/AlmaLinux-{latest}-aarch64-dvd.iso
        checksums_url: 
          https://repo.almalinux.org/almalinux/{major}/isos/aarch64/CHECKSUM
        filename_pattern: AlmaLinux-{latest}-aarch64-dvd.iso
      - id_template: alma-{latest}-minimal-arm64
        name_template: "AlmaLinux {latest}"
        arch: aarch64
        edition: Minimal
        url_template: 
          https://repo.almalinux.org/almalinux/{major}/isos/aarch64/AlmaLinux-{latest}-aarch64-minimal.iso
        checksums_url: 
          https://repo.almalinux.org/almalinux/{major}/isos/aarch64/CHECKSUM
        filename_pattern: AlmaLinux-{latest}-aarch64-minimal.iso
  centos-stream:
    product: centos-stream
    match_depth: 1
    update_templates:
      type: static
      category: linux
      homepage: https://www.centos.org/centos-stream/
      rolling_checksum: true
      checksum_algorithm: sha256
      variants:
      - id_template: centos-stream-{major}-dvd
        name_template: "CentOS Stream {major}"
        arch: x86_64
        edition: DVD
        checksums_url: 
          https://mirror.stream.centos.org/{major}-stream/BaseOS/x86_64/iso/SHA256SUM
        filename_pattern: CentOS-Stream-{major}-latest-x86_64-dvd1.iso
      - id_template: centos-stream-{major}-dvd-arm64
        name_template: "CentOS Stream {major}"
        arch: aarch64
        edition: DVD
        checksums_url: 
          https://mirror.stream.centos.org/{major}-stream/BaseOS/aarch64/iso/SHA256SUM
        filename_pattern: CentOS-Stream-{major}-latest-aarch64-dvd1.iso
  opensuse:
    product: opensuse
    match_depth: 2
  linuxmint:
    product: linuxmint
    match_depth: 1
    exclude_cycles:
    - lmde*
  freebsd:
    product: freebsd
    match_depth: 2
    eol_auto: false
    update_templates:
      type: static
      category: bsd
      homepage: https://www.freebsd.org/
      checksum_algorithm: sha256
      variants:
      - id_template: freebsd-{latest}
        name_template: "FreeBSD {latest}-RELEASE"
        arch: amd64
        edition: disc1
        url_template: 
          https://download.freebsd.org/releases/amd64/amd64/ISO-IMAGES/{latest}/FreeBSD-{latest}-RELEASE-amd64-disc1.iso
        checksums_url: 
          https://download.freebsd.org/releases/amd64/amd64/ISO-IMAGES/{latest}/CHECKSUM.SHA256-FreeBSD-{latest}-RELEASE-amd64
        filename_pattern: FreeBSD-{latest}-RELEASE-amd64-disc1.iso
      - id_template: freebsd-{latest}-arm64
        name_template: "FreeBSD {latest}-RELEASE"
        arch: aarch64
        edition: disc1
        url_template: 
          https://download.freebsd.org/releases/arm64/aarch64/ISO-IMAGES/{latest}/FreeBSD-{latest}-RELEASE-arm64-aarch64-disc1.iso
        checksums_url: 
          https://download.freebsd.org/releases/arm64/aarch64/ISO-IMAGES/{latest}/CHECKSUM.SHA256-FreeBSD-{latest}-RELEASE-arm64-aarch64
        filename_pattern: FreeBSD-{latest}-RELEASE-arm64-aarch64-disc1.iso
  openbsd:
    product: openbsd
    match_depth: 2
    update_templates:
      type: static
      category: bsd
      homepage: https://www.openbsd.org/
      checksum_algorithm: sha256
      variants:
      - id_template: openbsd-{cycle}
        name_template: "OpenBSD {cycle}"
        arch: amd64
        edition: install
        url_template: 
          https://cdn.openbsd.org/pub/OpenBSD/{cycle}/amd64/install{version_no_dots}.iso
        checksums_url: https://cdn.openbsd.org/pub/OpenBSD/{cycle}/amd64/SHA256
        filename_pattern: install{version_no_dots}.iso
      - id_template: openbsd-{cycle}-arm64
        name_template: "OpenBSD {cycle}"
        arch: arm64
        edition: install
        url_template: 
          https://cdn.openbsd.org/pub/OpenBSD/{cycle}/arm64/install{version_no_dots}.iso
        checksums_url: https://cdn.openbsd.org/pub/OpenBSD/{cycle}/arm64/SHA256
        filename_pattern: install{version_no_dots}.iso
  netbsd:
    product: netbsd
    match_depth: 1
    update_templates:
      type: static
      category: bsd
      homepage: https://www.netbsd.org/
      checksum_algorithm: sha512
      variants:
      - id_template: netbsd-{latest}
        name_template: "NetBSD {latest}"
        arch: amd64
        edition: install
        url_template: 
          https://cdn.netbsd.org/pub/NetBSD/NetBSD-{latest}/images/NetBSD-{latest}-amd64.iso
      - id_template: netbsd-{latest}-arm64
        name_template: "NetBSD {latest}"
        arch: arm64
        edition: install
        url_template: 
          https://cdn.netbsd.org/pub/NetBSD/NetBSD-{latest}/images/NetBSD-{latest}-evbarm-aarch64.iso
  alpine:
    product: alpine
    match_depth: 2
    update_templates:
      type: static
      category: linux
      homepage: https://alpinelinux.org/
      checksum_algorithm: sha256
      variants:
      - id_template: alpine-{cycle}
        name_template: "Alpine Linux {latest}"
        arch: x86_64
        edition: Standard
        url_template: 
          https://dl-cdn.alpinelinux.org/alpine/v{cycle}/releases/x86_64/alpine-standard-{latest}-x86_64.iso
        checksums_url: 
          https://dl-cdn.alpinelinux.org/alpine/v{cycle}/releases/x86_64/alpine-standard-{latest}-x86_64.iso.sha256
        filename_pattern: alpine-standard-{latest}-x86_64.iso
      - id_template: alpine-{cycle}-arm64
        name_template: "Alpine Linux {latest}"
        arch: aarch64
        edition: Standard
        url_template: 
          https://dl-cdn.alpinelinux.org/alpine/v{cycle}/releases/aarch64/alpine-standard-{latest}-aarch64.iso
        checksums_url: 
          https://dl-cdn.alpinelinux.org/alpine/v{cycle}/releases/aarch64/alpine-standard-{latest}-aarch64.iso.sha256
        filename_pattern: alpine-standard-{latest}-aarch64.iso
      - id_template: alpine-{cycle}-cloud-amd64
        name_template: "Alpine Linux {cycle}"
        version_template: "{cycle}"
        arch: x86_64
        edition: Cloud image
        image_type: cloud-image
        format: qcow2
        url_template: 
          https://dl-cdn.alpinelinux.org/alpine/v{cycle}/releases/cloud/nocloud_alpine-{latest}-x86_64-uefi-cloudinit-r0.qcow2
        checksums_url: 
          https://dl-cdn.alpinelinux.org/alpine/v{cycle}/releases/cloud/nocloud_alpine-{latest}-x86_64-uefi-cloudinit-r0.qcow2.sha512
        filename_pattern: nocloud_alpine-{latest}-x86_64-uefi-cloudinit-r0.qcow2
        checksum_algorithm: sha512
      - id_template: alpine-{cycle}-cloud-arm64
        name_template: "Alpine Linux {cycle}"
        version_template: "{cycle}"
        arch: aarch64
        edition: Cloud image
        image_type: cloud-image
        format: qcow2
        url_template: 
          https://dl-cdn.alpinelinux.org/alpine/v{cycle}/releases/cloud/nocloud_alpine-{latest}-aarch64-uefi-cloudinit-r0.qcow2
        checksums_url: 
          https://dl-cdn.alpinelinux.org/alpine/v{cycle}/releases/cloud/nocloud_alpine-{latest}-aarch64-uefi-cloudinit-r0.qcow2.sha512
        filename_pattern: 
          nocloud_alpine-{latest}-aarch64-uefi-cloudinit-r0.qcow2
        checksum_algorithm: sha512
  oracle:
    product: oracle-linux
    match_depth: 1
    update_templates:
      type: static
      category: linux
      homepage: https://www.oracle.com/linux/
      checksum_algorithm: sha256
      variants:
      - id_template: oracle-{latest}-dvd
        name_template: "Oracle Linux {latest}"
        arch: x86_64
        edition: DVD
        url_template: 
          https://yum.oracle.com/ISOS/OracleLinux/OL{major}/u{minor}/x86_64/OracleLinux-R{major}-U{minor}-x86_64-dvd.iso
      - id_template: oracle-{latest}-dvd-arm64
        name_template: "Oracle Linux {latest}"
        arch: aarch64
        edition: DVD
        url_template: 
          https://yum.oracle.com/ISOS/OracleLinux/OL{major}/u{minor}/aarch64/OracleLinux-R{major}-U{minor}-aarch64-dvd.iso
  amazon-linux:
    product: amazon-linux
    match_depth: 1
    exclude_cycles:
    - '2'
    update_templates:
      type: directory_parse
      category: linux
      homepage: https://aws.amazon.com/linux/amazon-linux-2023/
      checksum_algorithm: sha256
      variants:
      - id_template: amazon-linux-{cycle}-cloud-amd64
        name_template: "Amazon Linux {cycle}"
        version_template: "{cycle}"
        arch: x86_64
        edition: KVM cloud image
        image_type: cloud-image
        format: qcow2
        dir_url: https://cdn.amazonlinux.com/al2023/os-images/latest/kvm/
        filename_regex: al2023-kvm-.*-x86_64\.xfs\.gpt\.qcow2
        checksums_url: 
          https://cdn.amazonlinux.com/al2023/os-images/latest/kvm/SHA256SUMS
      - id_template: amazon-linux-{cycle}-cloud-arm64
        name_template: "Amazon Linux {cycle}"
        version_template: "{cycle}"
        arch: aarch64
        edition: KVM cloud image
        image_type: cloud-image
        format: qcow2
        dir_url: https://cdn.amazonlinux.com/al2023/os-images/latest/kvm-arm64/
        filename_regex: al2023-kvm-.*-arm64\.xfs\.gpt\.qcow2
        checksums_url: 
          https://cdn.amazonlinux.com/al2023/os-images/latest/kvm-arm64/SHA256SUMS
